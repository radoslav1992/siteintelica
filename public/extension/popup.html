<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg-dark: #0f1015;
      --text-main: #f8fafc;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
    }
    body {
      width: 300px;
      margin: 0;
      padding: 1.5rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      text-align: center;
    }
    h2 {
      margin: 0 0 0.5rem 0;
      font-size: 1.25rem;
      font-weight: 700;
    }
    p {
      margin: 0 0 1.5rem 0;
      font-size: 0.85rem;
      color: #94a3b8;
      line-height: 1.4;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 0.75rem 1rem;
      background-color: var(--accent);
      color: white;
      border: none;
      border-radius: 0.375rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .btn:hover {
      background-color: var(--accent-hover);
    }
  </style>
</head>
<body>
  <h2>SiteIntelica</h2>
  <p>Reveal the technology stack and monetization strategies of the current website in one click.</p>
  <button id="scan-btn" class="btn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 8px;">
      <circle cx="11" cy="11" r="8"></circle>
      <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
    </svg>
    Scan Current Site
  </button>
  
  <script src="popup.js"></script>
</body>
</html>
